<!DOCTYPE html>
<html lang="zh-CN"></html>
<head>
    <meta charset="UTF-8">
    <title>Visual Algorithm Programme</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="header">
        <h1>算法可视化工具</h1>
    </div>
    <div id="data-container">//JS找网页位置的坐标
    </div>

   <div class="controls">
    <button onclick="resetArray()">生成随机数组</button>
    <button onclick="startBubbleSort()">开始冒泡排序</button>
    <button onclick="startSelectionSort()">开始选择排序</button>
    <button onclick="startInputSort()">开始插入排序</button>
    <button onclick="testColor()">测试颜色变化</button>
    
    <div class="slider-box">
        <span>演示速度：</span>
        <input type="range" id="speed-slider" min="1" max="200" value="50">
    </div>
</div>
    <script>
        
        

        // 1. 先获取网页上的滑动条
        const speedSlider = document.getElementById('speed-slider');

        // 2. 重新定义 sleep，让它自己去读滑动条的数值
        const sleep = () => {
            // 延迟时间 = 201 - 滑动条的值
            // 这样滑块往右拖（值变大），延迟就变小，速度就变快
            let ms = 201 - speedSlider.value; 
            return new Promise(resolve => setTimeout(resolve, ms));
        };

        async function startBubbleSort(){
                console.log("开始冒泡排序");
                const bars=document.getElementsByClassName('bar');
                for(let i=0;i<array.length-1;i++){
                    for(let j=0;j<array.length-1-i;j++){
                        bars[j].style.backgroundColor='green';
                        bars[j+1].style.backgroundColor='green';
                        if(array[j]>array[j+1]){
                            let temp=array[j];
                            array[j]=array[j+1];
                            array[j+1]=temp;
                            bars[j].style.height=array[j]+"px";
                            bars[j+1].style.height=array[j+1]+"px";
                        }
                        await sleep();
                        bars[j].style.backgroundColor="#00d2ff";
                        bars[j+1].style.backgroundColor="#00d2ff";
                    }
                    bars[array.length-1-i].style.backgroundColor="green";

                }
                bars[0].style.backgroundColor="green";
            }

        async function startSelectionSort(){
            console.log("开始选择排序");
            const bars=document.getElementsByClassName('bar');
            for(let i=0;i<array.length;i++){
                let min=i;
                bars[i].style.backgroundColor='green';
                for(let j=i+1;j<array.length;j++){

                    bars[j].style.backgroundColor = "lightgreen";
                    await sleep();

                    if(array[j]<array[min]){
                      if (min!== i) {
                        bars[min].style.backgroundColor = "#00d2ff";
                      }
                        min = j;
                        bars[min].style.backgroundColor = "yellow"; // 新的“最矮候选人”
                    } 
                    else {
                        bars[j].style.backgroundColor = "#00d2ff";
                    }
                    
                }
                if(min!==i){
                    let temp=array[i];
                    array[i]=array[min];
                    array[min]=temp;

                    bars[i].style.height=array[i]+'px';
                    bars[min].style.height=array[min]+'px';

                    bars[min].style.backgroundColor="#00d2ff";
                }
                bars[i].style.backgroundColor='green';
            }
            
        }

        async function testColor(){
            let bars=document.getElementsByClassName('bar');
            bars[0].style.backgroundColor='red';
            await new Promise(resolve => setTimeout(resolve, 500))
            bars[0].style.backgroundColor="#00d2ff";
        }

        async function startInputSort(){
            console.log("开始插入排序");
            const bars=document.getElementsByClassName('bar');
            
            for(let i=1;i<array.length;i++){
                let j=0;
                let key=array[i];
                j=i-1;
                bars[i].style.backgroundColor = "red";
                await sleep(); 

                while(j>=0&&array[j]>key){
                    array[j+1]=array[j];

                    bars[j + 1].style.height = array[j + 1] + "px";
                    bars[j + 1].style.backgroundColor = "lightgreen"; 
            
                    j = j - 1;
                    await sleep(); 
                 }
                
                array[j+1]=key;
                bars[j + 1].style.height = key + "px";

                 
                for (let k = 0; k <= i; k++) {
                 bars[k].style.backgroundColor = "green";
                }
            }  
            
        }
        

        //数据驱动视图
        let array=[];
        const container=document.getElementById('data-container');
        
       function resetArray() {
            container.innerHTML = ''; // 清空
            array = [];
            for (let i = 0; i < 40; i++) {
                let val = Math.floor(Math.random() * 350) + 10;
                array.push(val);
                
                
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${val}px`;
                container.appendChild(bar);
            }
        }

        // 初始生成一次
        resetArray();
    </script>
</body>
</html>
